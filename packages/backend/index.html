<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrong URL</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        padding: 40px;
        max-width: 600px;
        text-align: center;
      }
      h1 {
        color: #e74c3c;
        font-size: 32px;
        margin-bottom: 20px;
      }
      p {
        color: #555;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 15px;
      }
      .error-code {
        color: #667eea;
        font-weight: bold;
        font-size: 18px;
      }
      .footer {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        color: #888;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚠️ Wrong URL</h1>
      <p>You appear to be on an incorrect URL.</p>
      <p class="error-code">Error Code: INVALID_ENDPOINT</p>
      <p>
        Please contact the administrator to get the correct application URL.
      </p>
      <div class="footer">
        <p>If you believe this is an error, please reach out to support.</p>
      </div>
    </div>
  </body>
</html>
